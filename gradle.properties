# Project-wide Gradle settings.\n# IDE (e.g. Android Studio) users:\n# Gradle settings configured through the IDE are ignored when building from the command line, check\n# build.gradle files instead.\n\n# For more details on how to configure your build environment visit\n# http://www.gradle.org/configure-build-environment\n\n# Specifies the JVM arguments used for the daemon process.\n# The setting is particularly useful for headless machines. See also http://gradle.org/daemon\norg.gradle.jvmargs=-Xmx4096m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+IgnoreUnrecognizedVMOptions --add-opens java.base/java.lang=ALL-UNNAMED\n\n# When configured, Gradle will run in incubating parallel mode.\n# This option should only be used with decoupled projects. More details, visit\n# http://www.gradle.org/configure-build-environment#configuring-project-wide-properties\norg.gradle.parallel=true\n\n# AndroidX package structure to make it clearer which packages are being used\nandroid.useAndroidX=true\n\n# Kotlin code style for this project: \"official\" or \"obsolete\":\nkotlin.code.style=official\n\n# Enable non-transitive R classes\nandroid.nonTransitiveRClass=true\n\n# Build features\nandroid.enableJetifier=true\n\n# Suppress warnings for gradle configuration\nandroid.suppressUnsupportedCompileSdk=34\n\n# Enable build cache for faster builds\norg.gradle.caching=true\n\n# Daemon settings for faster builds\norg.gradle.daemon=true\norg.gradle.daemon.idletimeout=60000\n\n# Enable on-demand configuration\norg.gradle.configuration.on-demand=true\n